<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>United Builders Attendance</title><link rel='stylesheet' href='style.css'></head><body><header><h1>United Builders</h1><p>Staff Attendance</p></header><main><section id='login' class='card'><h2>Enter PIN</h2><input id='pin' type='password' inputmode='numeric' maxlength='4' placeholder='••••'><button onclick='login()'>Continue</button><p id='err'></p><small>Admin: 9999 · Workers: 1001–1015</small></section><section id='worker' class='hidden'><div class='card'><h2 id='wname'></h2><select id='site'><option>Derby Site</option><option>Nottingham Site</option><option>Other</option></select><div class='grid'><button onclick='act("in")'>Clock In</button><button onclick='act("breakStart")'>Start Break</button><button onclick='act("breakEnd")'>End Break</button><button onclick='act("out")'>Clock Out</button></div><p id='status'></p><h3>This week: <span id='week'>0h 00m</span></h3><button class='secondary' onclick='logout()'>Log out</button></div></section><section id='admin' class='hidden'><div class='card'><h2>Admin Dashboard</h2><button onclick='exportCSV()'>Export CSV</button><table><thead><tr><th>Worker</th><th>Status</th><th>Site</th><th>Weekly hours</th></tr></thead><tbody id='rows'></tbody></table><button class='secondary' onclick='logout()'>Log out</button></div></section></main><script src='app.js'></script></body></html>
