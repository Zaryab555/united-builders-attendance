<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#111827"><title>United Builders Attendance</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body>
<section id="loginView" class="screen"><div class="card login-card"><div class="brand"><div class="logo">UB</div><div><h1>United Builders Attendance</h1><p>Staff attendance and site reporting</p></div></div><label>Employee</label><select id="employeeSelect"></select><label>4-digit PIN</label><input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="Enter PIN"><button id="loginBtn" class="primary">Login</button><p id="loginMessage" class="message"></p></div></section>
<section id="dashboardView" class="screen hidden"><header class="topbar"><div><h2 id="welcomeTitle">Welcome</h2><p id="roleText"></p></div><button id="logoutBtn" class="secondary small">Logout</button></header><main class="container"><div class="grid stats"><div class="stat-card"><span>Status</span><strong id="currentStatus">Not clocked in</strong></div><div class="stat-card"><span>Today</span><strong id="todayHours">0h 0m</strong></div><div class="stat-card"><span>This week</span><strong id="weekHours">0h 0m</strong></div></div>
<section class="card"><h3>Attendance</h3><label>Work site</label><select id="siteSelect"></select><div class="button-row"><button id="clockInBtn" class="success">Clock In</button><button id="clockOutBtn" class="danger">Clock Out</button></div><div class="button-row"><button id="breakStartBtn" class="secondary">Start Break</button><button id="breakEndBtn" class="secondary">End Break</button></div><p id="attendanceMessage" class="message"></p></section>
<section class="card"><h3>Daily Work Report</h3><label>Work completed today</label><textarea id="workNote" rows="4" placeholder="Describe today's work"></textarea><label>Photo</label><input id="photoInput" type="file" accept="image/*" capture="environment"><button id="saveReportBtn" class="primary">Save Report</button><p id="reportMessage" class="message"></p></section>
<section id="managementPanel" class="card hidden"><h3>Management Dashboard</h3><div class="button-row"><button id="refreshAdminBtn" class="secondary">Refresh</button><button id="exportCsvBtn" class="secondary">Export CSV</button></div><h4>Today's attendance</h4><div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Site</th><th>Clock In</th><th>Clock Out</th><th>Status</th></tr></thead><tbody id="attendanceTableBody"></tbody></table></div><div id="adminOnlyPanel" class="hidden"><h4>Add Worker</h4><div class="form-grid"><input id="newWorkerName" placeholder="Full name"><select id="newWorkerRole"><option value="worker">Worker</option><option value="manager">Manager</option><option value="admin">Admin</option></select><input id="newWorkerPin" inputmode="numeric" maxlength="4" placeholder="4-digit PIN"><button id="addWorkerBtn" class="primary">Add Worker</button></div><h4>Add Site</h4><div class="form-grid"><input id="newSiteName" placeholder="Site name/address"><button id="addSiteBtn" class="primary">Add Site</button></div></div></section></main></section><script type="module" src="app.js"></script></body></html>
