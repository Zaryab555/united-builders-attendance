name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "style.css"
      - "app.js"
      - "firebase-config.js"
      - "manifest.json"
      - "package.json"
      - "capacitor.config.json"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java
